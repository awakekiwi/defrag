<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEFRAG — Level Editor</title>
<style>
  :root {
    --void: #0a0e12;
    --rail: #142028;
    --surface: #0f1a22;
    --border: #1d3540;
    --border-bright: #2a5060;
    --process: #3dd6c4;
    --process-dim: #1f6a62;
    --gc: #e8643c;
    --fragment: #d4c84a;
    --conduit: #2a6070;
    --text: #6b8a96;
    --text-bright: #9ab8c4;
    --cable: #3a5560;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: var(--void);
    color: var(--text);
    font-family: 'Courier New', monospace;
    height: 100%;
    overflow: hidden;
    user-select: none;
  }

  /* ---- LAYOUT ---- */
  #app {
    display: grid;
    grid-template-rows: 44px 1fr 36px;
    grid-template-columns: 200px 1fr 220px;
    height: 100vh;
    gap: 0;
  }

  /* ---- TOPBAR ---- */
  #topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  #topbar .logo {
    color: var(--process);
    font-size: 13px;
    letter-spacing: 6px;
    font-weight: bold;
    flex-shrink: 0;
  }
  #topbar .sep { color: var(--border-bright); }
  #topbar input[type="text"] {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text-bright);
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 4px 6px;
    width: 200px;
    outline: none;
  }
  #topbar input[type="text"]:focus { border-color: var(--process-dim); }
  .tbtn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 5px 12px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .tbtn:hover { border-color: var(--process-dim); color: var(--process); }
  .tbtn.primary { border-color: var(--process-dim); color: var(--process); }
  .tbtn.primary:hover { background: rgba(61,214,196,0.1); }
  .tbtn.danger { border-color: #5a2018; color: var(--gc); }
  .tbtn.danger:hover { background: rgba(232,100,60,0.1); }
  #topbar .spacer { flex: 1; }
  #levelName { flex: 1; max-width: 240px; }

  /* ---- LEFT PANEL: tile palette ---- */
  #palette {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow-y: auto;
  }
  #palette h3 {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text);
    text-transform: uppercase;
    margin-bottom: 6px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .tile-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 9px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    text-align: left;
    border-radius: 2px;
    transition: all 0.1s;
  }
  .tile-btn:hover { border-color: var(--border); color: var(--text-bright); }
  .tile-btn.active { border-color: var(--process-dim); color: var(--process); background: rgba(61,214,196,0.06); }
  .tile-swatch {
    width: 18px; height: 18px;
    border-radius: 2px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
  }
  #palette .section-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--border-bright);
    text-transform: uppercase;
    margin-top: 10px;
    margin-bottom: 2px;
  }

  /* ---- CANVAS AREA ---- */
  #canvas-wrap {
    position: relative;
    overflow: auto;
    background: var(--void);
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
  }
  #grid-canvas {
    cursor: crosshair;
    display: block;
    image-rendering: pixelated;
  }

  /* ---- RIGHT PANEL: levels list ---- */
  #sidebar {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #sidebar-head {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #levels-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .level-card {
    background: var(--rail);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 0;
    cursor: pointer;
    transition: border-color 0.15s;
    overflow: hidden;
  }
  .level-card:hover { border-color: var(--border-bright); }
  .level-card.active { border-color: var(--process-dim); }
  .level-card canvas { display: block; width: 100%; height: 54px; image-rendering: pixelated; }
  .level-card-info {
    padding: 6px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 4px;
  }
  .level-card-name { font-size: 10px; letter-spacing: 1px; color: var(--text-bright); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .level-card-del { background: none; border: none; color: #4a2010; cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1; }
  .level-card-del:hover { color: var(--gc); }
  .drag-handle { color: var(--border-bright); cursor: grab; font-size: 12px; padding: 0 4px; }

  /* ---- STATUSBAR ---- */
  #statusbar {
    grid-column: 1 / -1;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 0 14px;
    font-size: 10px;
    letter-spacing: 1px;
  }
  #statusbar .stat { color: var(--text); }
  #statusbar .stat b { color: var(--text-bright); }
  #statusbar .stat.warn b { color: var(--gc); }
  #statusbar .stat.ok b { color: var(--process); }
  #statusbar .spacer { flex: 1; }
  #statusbar .hint { color: var(--border-bright); font-size: 9px; }

  /* ---- VALIDATION OVERLAY ---- */
  #validation {
    position: absolute;
    bottom: 8px; right: 8px;
    background: rgba(10,14,18,0.92);
    border: 1px solid var(--border);
    padding: 8px 12px;
    font-size: 10px;
    letter-spacing: 1px;
    pointer-events: none;
    max-width: 180px;
  }
  #validation.hidden { display: none; }
  #validation .v-ok { color: var(--process); }
  #validation .v-err { color: var(--gc); }

  /* ---- EMPTY STATE ---- */
  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 8px;
    color: var(--border-bright);
    font-size: 11px;
    letter-spacing: 2px;
    padding: 16px;
    text-align: center;
  }
  #empty-state .big { font-size: 28px; opacity: 0.3; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--void); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">

  <!-- TOPBAR -->
  <div id="topbar">
    <span class="logo">DEFRAG</span>
    <span class="sep">/</span>
    <span style="font-size:10px;letter-spacing:2px;color:var(--text)">EDITOR</span>
    <input type="text" id="levelName" placeholder="SECTOR NAME..." maxlength="32" value="NEW SECTOR">
    <button class="tbtn" onclick="newLevel()">NEW</button>
    <button class="tbtn primary" onclick="saveLevel()">SAVE</button>
    <button class="tbtn" onclick="exportLevel()">EXPORT LEVEL</button>
    <button class="tbtn primary" onclick="exportAllLevels()">EXPORT ALL</button>
    <button class="tbtn" onclick="importLevel()">IMPORT</button>
    <div class="spacer"></div>
    <button class="tbtn" onclick="validateLevel()" title="Check level is solvable">VALIDATE</button>
    <button class="tbtn danger" onclick="clearGrid()">CLEAR</button>
  </div>

  <!-- LEFT: PALETTE -->
  <div id="palette">
    <h3>Tiles</h3>

    <div class="section-label">Structure</div>
    <button class="tile-btn active" data-tile="." onclick="setTile('.')">
      <span class="tile-swatch" style="background:#0a0e12;border:1px solid #1d3540"></span>
      Empty
    </button>
    <button class="tile-btn" data-tile="#" onclick="setTile('#')">
      <span class="tile-swatch" style="background:#1a2832;border:1px solid #243a47"></span>
      Memory Block
    </button>
    <button class="tile-btn" data-tile="=" onclick="setTile('=')">
      <span class="tile-swatch" style="background:#142028"></span>
      Bus Rail
    </button>

    <div class="section-label">Navigation</div>
    <button class="tile-btn" data-tile="H" onclick="setTile('H')">
      <span class="tile-swatch" style="background:#0a2030;border:1px solid #2a6070">H</span>
      Conduit
    </button>
    <button class="tile-btn" data-tile="-" onclick="setTile('-')">
      <span class="tile-swatch" style="background:#0a1820;border:1px solid #3a5560">—</span>
      Cable
    </button>

    <div class="section-label">Objects</div>
    <button class="tile-btn" data-tile="*" onclick="setTile('*')">
      <span class="tile-swatch" style="background:#1a1400;border:1px solid #d4c84a">◆</span>
      Fragment
    </button>

    <div class="section-label">Spawns</div>
    <button class="tile-btn" data-tile="P" onclick="setTile('P')">
      <span class="tile-swatch" style="background:#0a2028;border:1px solid #3dd6c4">P</span>
      Player
    </button>
    <button class="tile-btn" data-tile="G" onclick="setTile('G')">
      <span class="tile-swatch" style="background:#280e08;border:1px solid #e8643c">G</span>
      Collector
    </button>

    <div style="flex:1"></div>
    <div class="section-label" style="margin-top:16px">Tools</div>
    <button class="tile-btn" data-tile="ERASE" onclick="setTile('ERASE')">
      <span class="tile-swatch" style="border:1px solid #5a2018;color:#e8643c">✕</span>
      Erase
    </button>
    <button class="tile-btn" data-tile="FILL" onclick="setTile('FILL')">
      <span class="tile-swatch" style="border:1px solid #2a5060;color:#3dd6c4">▣</span>
      Fill Row
    </button>
  </div>

  <!-- CENTER: GRID CANVAS -->
  <div id="canvas-wrap">
    <canvas id="grid-canvas"></canvas>
    <div id="validation" class="hidden"></div>
  </div>

  <!-- RIGHT: SAVED LEVELS -->
  <div id="sidebar">
    <div id="sidebar-head">
      <span>Saved Sectors</span>
      <span id="level-count" style="color:var(--process-dim)">0</span>
    </div>
    <div id="levels-list">
      <div id="empty-state">
        <div class="big">⬡</div>
        <div>No sectors saved yet.</div>
        <div style="font-size:9px;color:var(--border)">Design one and hit SAVE.</div>
      </div>
    </div>
  </div>

  <!-- STATUSBAR -->
  <div id="statusbar">
    <span class="stat">COL <b id="st-col">—</b></span>
    <span class="stat">ROW <b id="st-row">—</b></span>
    <span class="stat" id="st-frags-wrap">FRAGS <b id="st-frags">0</b></span>
    <span class="stat" id="st-player-wrap">PLAYER <b id="st-player">—</b></span>
    <span class="stat" id="st-guards-wrap">COLLECTORS <b id="st-guards">0</b></span>
    <div class="spacer"></div>
    <span class="hint">Z — undo &nbsp;·&nbsp; drag to paint &nbsp;·&nbsp; right-click to erase &nbsp;·&nbsp; FILL paints the whole row</span>
  </div>

</div>

<script>
// ============================================================
//  DEFRAG LEVEL EDITOR
//  Grid: 28 cols × 16 rows  (same as game)
//  Tile codes match game exactly
// ============================================================

const COLS = 28, ROWS = 16;
const CELL = 28; // px per cell on the editor canvas
const W = COLS * CELL, H_GRID = ROWS * CELL;

// Tile colours (matching game palette)
const TILE_COLORS = {
  '.': { bg: '#0a0e12', border: '#1a2c36' },
  '#': { bg: '#1a2832', border: '#243a47', label: null },
  '=': { bg: '#142028', border: '#1d3540' },
  'H': { bg: '#0a2030', border: '#2a6070', label: 'H' },
  '-': { bg: '#0a1820', border: '#3a5560', label: '—' },
  '*': { bg: '#1a1400', border: '#d4c84a', label: '◆', labelColor: '#d4c84a' },
  'P': { bg: '#0a2028', border: '#3dd6c4', label: 'P', labelColor: '#3dd6c4' },
  'G': { bg: '#280e08', border: '#e8643c', label: 'G', labelColor: '#e8643c' },
};

let grid = [];
let history = [];   // for undo
let activeTile = '.';
let painting = false;
let paintBtn = 0;
let currentLevelId = null;
let hoveredCell = null;

const canvas = document.getElementById('grid-canvas');
const ctx = canvas.getContext('2d');
canvas.width = W;
canvas.height = H_GRID;
canvas.style.width = W + 'px';
canvas.style.height = H_GRID + 'px';

// ---- GRID INIT ----
function blankGrid() {
  const g = [];
  for (let y = 0; y < ROWS; y++) {
    const row = [];
    for (let x = 0; x < COLS; x++) {
      row.push(y === ROWS - 1 ? '=' : '.');
    }
    g.push(row);
  }
  return g;
}

function newLevel() {
  if (grid.some(r => r.some(c => c !== '.' && c !== '=')) && !confirm('Discard unsaved changes?')) return;
  grid = blankGrid();
  history = [];
  currentLevelId = null;
  document.getElementById('levelName').value = 'NEW SECTOR';
  render();
  updateStatus();
  hideValidation();
}

function clearGrid() {
  if (!confirm('Clear the grid?')) return;
  pushHistory();
  grid = blankGrid();
  render();
  updateStatus();
}

// ---- TILE SELECTION ----
function setTile(t) {
  activeTile = t;
  document.querySelectorAll('.tile-btn').forEach(b => b.classList.toggle('active', b.dataset.tile === t));
}

// ---- PAINTING ----
canvas.addEventListener('mousedown', e => {
  painting = true;
  paintBtn = e.button;
  pushHistory();
  paint(e);
});
canvas.addEventListener('mousemove', e => {
  const {cx, cy} = cellAt(e);
  hoveredCell = {cx, cy};
  document.getElementById('st-col').textContent = cx;
  document.getElementById('st-row').textContent = cy;
  if (painting) paint(e);
});
canvas.addEventListener('mouseup', () => { painting = false; });
canvas.addEventListener('mouseleave', () => { painting = false; hoveredCell = null; render(); });
canvas.addEventListener('contextmenu', e => { e.preventDefault(); });

function cellAt(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const cx = Math.floor((e.clientX - rect.left) * scaleX / CELL);
  const cy = Math.floor((e.clientY - rect.top) * scaleY / CELL);
  return { cx: Math.max(0, Math.min(COLS-1, cx)), cy: Math.max(0, Math.min(ROWS-1, cy)) };
}

function paint(e) {
  const {cx, cy} = cellAt(e);
  // right-click always erases
  const tile = (paintBtn === 2 || activeTile === 'ERASE') ? '.' : activeTile;

  if (tile === 'FILL') {
    // fill the whole row with the last non-fill non-erase tile
    const fill = activeTile === 'FILL' ? '#' : activeTile;
    for (let x = 0; x < COLS; x++) grid[cy][x] = fill;
  } else {
    // enforce constraints
    if (tile === 'P') clearTile('P'); // only one player
    if (cy === ROWS - 1 && tile !== '=' && tile !== '#') return; // bottom row must stay solid
    grid[cy][cx] = tile;
  }
  render();
  updateStatus();
}

function clearTile(t) {
  for (let y = 0; y < ROWS; y++)
    for (let x = 0; x < COLS; x++)
      if (grid[y][x] === t) grid[y][x] = '.';
}

// ---- UNDO ----
function pushHistory() {
  history.push(grid.map(r => [...r]));
  if (history.length > 60) history.shift();
}
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
});
function undo() {
  if (!history.length) return;
  grid = history.pop();
  render();
  updateStatus();
}

// ---- RENDER ----
function render() {
  ctx.clearRect(0, 0, W, H_GRID);

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      drawCell(x, y, grid[y][x]);
    }
  }

  // hover highlight
  if (hoveredCell) {
    const {cx, cy} = hoveredCell;
    ctx.strokeStyle = 'rgba(61,214,196,0.5)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(cx * CELL + 0.5, cy * CELL + 0.5, CELL - 1, CELL - 1);
  }

  // grid lines overlay
  ctx.strokeStyle = 'rgba(29,53,64,0.4)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x*CELL, 0); ctx.lineTo(x*CELL, H_GRID); ctx.stroke(); }
  for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0, y*CELL); ctx.lineTo(W, y*CELL); ctx.stroke(); }

  // row/col labels on edges
  ctx.fillStyle = 'rgba(42,80,96,0.6)';
  ctx.font = '7px monospace';
  ctx.textAlign = 'center';
  for (let x = 0; x < COLS; x+=4) ctx.fillText(x, x*CELL + CELL/2, 8);
  ctx.textAlign = 'right';
  for (let y = 0; y < ROWS; y+=2) ctx.fillText(y, CELL - 2, y*CELL + CELL/2 + 3);
}

function drawCell(x, y, tile) {
  const px = x * CELL, py = y * CELL;
  const info = TILE_COLORS[tile] || TILE_COLORS['.'];

  ctx.fillStyle = info.bg;
  ctx.fillRect(px, py, CELL, CELL);

  // tile-specific decoration
  if (tile === '#') {
    ctx.strokeStyle = info.border;
    ctx.lineWidth = 1;
    ctx.strokeRect(px+2, py+2, CELL-4, CELL-4);
    ctx.fillStyle = 'rgba(61,214,196,0.06)';
    for (let i=0;i<3;i++) ctx.fillRect(px+6+i*7, py+CELL-5, 3, 2);
  } else if (tile === '=') {
    ctx.fillStyle = '#1d3540';
    ctx.fillRect(px+1, py+1, CELL-2, 3);
    ctx.fillStyle = 'rgba(74,130,148,0.2)';
    ctx.fillRect(px+4, py+CELL/2-1, 8, 2);
  } else if (tile === 'H') {
    ctx.fillStyle = info.border;
    ctx.fillRect(px+5, py, 3, CELL);
    ctx.fillRect(px+CELL-8, py, 3, CELL);
    for (let r=0;r<3;r++) { ctx.fillStyle='rgba(42,96,112,0.6)'; ctx.fillRect(px+5, py+5+r*8, CELL-10, 2); }
  } else if (tile === '-') {
    ctx.strokeStyle = info.border;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(px, py+7); ctx.quadraticCurveTo(px+CELL/2, py+11, px+CELL, py+7); ctx.stroke();
  } else if (tile === '*') {
    const cx = px+CELL/2, cy = py+CELL/2;
    ctx.fillStyle = info.border;
    ctx.beginPath(); ctx.moveTo(cx,cy-6); ctx.lineTo(cx+5,cy); ctx.lineTo(cx,cy+6); ctx.lineTo(cx-5,cy); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(212,200,74,0.15)';
    ctx.fillRect(cx-8,cy-8,16,16);
  }

  if (info.label) {
    ctx.fillStyle = info.labelColor || info.border;
    ctx.font = `bold ${tile === 'H' ? 8 : 11}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(info.label, px + CELL/2, py + CELL/2 + 4);
  }
}

// ---- STATUS ----
function updateStatus() {
  let frags = 0, player = false, guards = 0;
  for (let y = 0; y < ROWS; y++)
    for (let x = 0; x < COLS; x++) {
      if (grid[y][x] === '*') frags++;
      if (grid[y][x] === 'P') player = true;
      if (grid[y][x] === 'G') guards++;
    }
  const fw = document.getElementById('st-frags-wrap');
  fw.className = 'stat ' + (frags > 0 ? 'ok' : 'warn');
  document.getElementById('st-frags').textContent = frags;
  const pw = document.getElementById('st-player-wrap');
  pw.className = 'stat ' + (player ? 'ok' : 'warn');
  document.getElementById('st-player').textContent = player ? 'OK' : 'MISSING';
  const gw = document.getElementById('st-guards-wrap');
  gw.className = 'stat ' + (guards > 0 ? 'ok' : 'warn');
  document.getElementById('st-guards').textContent = guards;
}

// ---- VALIDATION ----
function validateLevel() {
  const errors = [];
  const isSolid = t => t === '#' || t === '=';
  const isClimb = t => t === 'H';

  // count special tiles
  let players=0, guards=0, frags=0;
  let px=-1, py=-1;
  for (let y=0;y<ROWS;y++) for (let x=0;x<COLS;x++) {
    const t = grid[y][x];
    if (t==='P'){players++;px=x;py=y;}
    if (t==='G') guards++;
    if (t==='*') frags++;
  }
  if (players !== 1) errors.push('Need exactly 1 player spawn');
  if (guards < 1)   errors.push('Need at least 1 collector');
  if (frags < 1)    errors.push('Need at least 1 fragment');

  // bottom row solid
  if (!grid[ROWS-1].every(t => isSolid(t))) errors.push('Bottom row must be all solid');

  // exit: H reaching row 0
  const exitCols = [];
  for (let x=0;x<COLS;x++) if (grid[0][x]==='H') exitCols.push(x);
  if (exitCols.length === 0) errors.push('No exit conduit at top row');

  // reachability BFS from player
  if (players === 1) {
    const key = (x,y) => x+','+y;
    const seen = new Set(); const q = [[px,py]]; seen.add(key(px,py));
    const passable = (x,y) => x>=0&&x<COLS&&y>=0&&y<ROWS&&!isSolid(grid[y][x]);
    while (q.length) {
      const [x,y] = q.shift(); const mv = [];
      if (passable(x-1,y)) mv.push([x-1,y]);
      if (passable(x+1,y)) mv.push([x+1,y]);
      if (isClimb(grid[y][x])&&passable(x,y-1)) mv.push([x,y-1]);
      if (y+1<ROWS&&!isSolid(grid[y+1][x])) mv.push([x,y+1]);
      else if (y+1<ROWS&&grid[y+1][x]==='#') mv.push([x,y+1]); // can dig down
      for (const [nx,ny] of mv) if (!seen.has(key(nx,ny))){ seen.add(key(nx,ny)); q.push([nx,ny]); }
    }
    let unreached = 0;
    for (let y=0;y<ROWS;y++) for (let x=0;x<COLS;x++) if (grid[y][x]==='*'&&!seen.has(key(x,y))) unreached++;
    if (unreached > 0) errors.push(`${unreached} fragment(s) unreachable`);
    const exitReachable = exitCols.some(x => seen.has(key(x,0))||seen.has(key(x,1)));
    if (players===1 && !exitReachable) errors.push('Exit conduit unreachable');
  }

  // show
  const el = document.getElementById('validation');
  el.classList.remove('hidden');
  if (errors.length === 0) {
    el.innerHTML = '<div class="v-ok">✓ SECTOR VALID</div><div class="v-ok" style="font-size:9px;margin-top:4px;opacity:0.7">All checks passed</div>';
  } else {
    el.innerHTML = errors.map(e => `<div class="v-err">✕ ${e}</div>`).join('');
  }
  setTimeout(() => el.classList.add('hidden'), 5000);
}

function hideValidation() {
  document.getElementById('validation').classList.add('hidden');
}

// ---- THUMBNAIL ----
function makeThumbnail(gridData) {
  const tw = COLS * 6, th = ROWS * 6;
  const tc = document.createElement('canvas');
  tc.width = tw; tc.height = th;
  const tx = tc.getContext('2d');
  const isSolid = t => t==='#'||t==='=';
  for (let y=0;y<ROWS;y++) for (let x=0;x<COLS;x++) {
    const t = gridData[y][x];
    const info = TILE_COLORS[t]||TILE_COLORS['.'];
    tx.fillStyle = info.bg;
    tx.fillRect(x*6, y*6, 6, 6);
    if (t!=='.'){ tx.fillStyle=info.border; tx.fillRect(x*6+1,y*6+1,4,4); }
  }
  return tc;
}

// ---- SAVE / LOAD ----
function loadLevels() {
  try { return JSON.parse(localStorage.getItem('defrag_levels') || '[]'); }
  catch(e) { return []; }
}
function saveLevels(levels) {
  localStorage.setItem('defrag_levels', JSON.stringify(levels));
}

function saveLevel() {
  const name = document.getElementById('levelName').value.trim() || 'UNNAMED';
  const mapData = grid.map(r => r.join(''));
  const levels = loadLevels();
  if (currentLevelId) {
    const idx = levels.findIndex(l => l.id === currentLevelId);
    if (idx >= 0) { levels[idx].name = name; levels[idx].map = mapData; levels[idx].updated = Date.now(); }
    else { levels.push({ id: currentLevelId, name, map: mapData, created: Date.now(), updated: Date.now() }); }
  } else {
    currentLevelId = 'lvl_' + Date.now();
    levels.push({ id: currentLevelId, name, map: mapData, created: Date.now(), updated: Date.now() });
  }
  saveLevels(levels);
  renderSidebar();
}

function loadLevel(id) {
  const levels = loadLevels();
  const lvl = levels.find(l => l.id === id);
  if (!lvl) return;
  pushHistory();
  currentLevelId = id;
  document.getElementById('levelName').value = lvl.name;
  grid = lvl.map.map(r => r.split(''));
  render();
  updateStatus();
  hideValidation();
}

function deleteLevel(id) {
  if (!confirm('Delete this sector?')) return;
  const levels = loadLevels().filter(l => l.id !== id);
  saveLevels(levels);
  if (currentLevelId === id) { currentLevelId = null; }
  renderSidebar();
}

function renderSidebar() {
  const levels = loadLevels();
  const list = document.getElementById('levels-list');
  document.getElementById('level-count').textContent = levels.length;
  if (levels.length === 0) {
    list.innerHTML = `<div id="empty-state"><div class="big">⬡</div><div>No sectors saved yet.</div><div style="font-size:9px;color:var(--border)">Design one and hit SAVE.</div></div>`;
    return;
  }
  list.innerHTML = '';
  levels.forEach(lvl => {
    const card = document.createElement('div');
    card.className = 'level-card' + (lvl.id === currentLevelId ? ' active' : '');
    card.draggable = true;
    // thumbnail
    const thumb = makeThumbnail(lvl.map.map(r => r.split('')));
    thumb.style.cssText = 'display:block;width:100%;height:54px;image-rendering:pixelated';
    card.appendChild(thumb);
    // info row
    const info = document.createElement('div');
    info.className = 'level-card-info';
    info.innerHTML = `
      <span class="drag-handle" title="Drag to reorder">⠿</span>
      <span class="level-card-name">${lvl.name}</span>
      <button class="level-card-del" title="Delete">✕</button>
    `;
    info.querySelector('.level-card-del').onclick = e => { e.stopPropagation(); deleteLevel(lvl.id); };
    card.appendChild(info);
    card.onclick = () => loadLevel(lvl.id);
    // drag-to-reorder
    card.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', lvl.id); });
    card.addEventListener('dragover', e => { e.preventDefault(); card.style.borderColor = 'var(--process)'; });
    card.addEventListener('dragleave', () => { card.style.borderColor = ''; });
    card.addEventListener('drop', e => {
      e.preventDefault(); card.style.borderColor = '';
      const fromId = e.dataTransfer.getData('text/plain');
      if (fromId === lvl.id) return;
      const lvls = loadLevels();
      const fromIdx = lvls.findIndex(l=>l.id===fromId);
      const toIdx = lvls.findIndex(l=>l.id===lvl.id);
      const [moved] = lvls.splice(fromIdx,1); lvls.splice(toIdx,0,moved);
      saveLevels(lvls); renderSidebar();
    });
    list.appendChild(card);
  });
}

// ---- EXPORT / IMPORT ----
function exportLevel() {
  const name = document.getElementById('levelName').value.trim() || 'UNNAMED';
  const mapData = grid.map(r => r.join(''));
  const json = JSON.stringify({ name, map: mapData }, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name.toLowerCase().replace(/\s+/g,'-') + '.json';
  a.click();
}

function importLevel() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json,application/json';
  input.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);

        // Multi-level file: array of {name, map} objects
        if (Array.isArray(data) && data.length > 0 && data[0].map) {
          const levels = loadLevels();
          let count = 0;
          for (const entry of data) {
            if (!entry.map || entry.map.length !== ROWS) continue;
            levels.push({
              id: 'lvl_' + Date.now() + '_' + count,
              name: entry.name || 'IMPORTED ' + (count+1),
              map: entry.map,
              created: Date.now(),
              updated: Date.now()
            });
            count++;
          }
          saveLevels(levels);
          renderSidebar();
          // load the first imported one into the editor
          if (count > 0) {
            currentLevelId = levels[levels.length - count].id;
            document.getElementById('levelName').value = levels[levels.length - count].name;
            grid = levels[levels.length - count].map.map(r => r.split('').slice(0, COLS));
            render(); updateStatus();
          }
          alert(count + ' level(s) imported');
          return;
        }

        // Multi-level file: array of map arrays (raw defragExportAll format)
        if (Array.isArray(data) && Array.isArray(data[0]) && typeof data[0][0] === 'string') {
          const levels = loadLevels();
          let count = 0;
          for (const map of data) {
            if (map.length !== ROWS) continue;
            levels.push({
              id: 'lvl_' + Date.now() + '_' + count,
              name: 'IMPORTED ' + (count+1),
              map: map,
              created: Date.now(),
              updated: Date.now()
            });
            count++;
          }
          saveLevels(levels);
          renderSidebar();
          if (count > 0) {
            currentLevelId = levels[levels.length - count].id;
            document.getElementById('levelName').value = levels[levels.length - count].name;
            grid = levels[levels.length - count].map.map(r => r.split('').slice(0, COLS));
            render(); updateStatus();
          }
          alert(count + ' level(s) imported');
          return;
        }

        // Single level file: {name, map}
        if (data.map && data.map.length === ROWS) {
          pushHistory();
          currentLevelId = null;
          document.getElementById('levelName').value = data.name || 'IMPORTED';
          grid = data.map.map(r => r.split('').slice(0, COLS).concat(Array(Math.max(0, COLS - r.length)).fill('.')));
          render(); updateStatus();
          return;
        }

        alert('Invalid level file');
      } catch(err) { alert('Could not read file: ' + err.message); }
    };
    reader.readAsText(f);
  };
  input.click();
}

// ---- EXPORT ALL LEVELS ----
function exportAllLevels() {
  const levels = loadLevels();
  if (levels.length === 0) { alert('No saved levels to export'); return; }
  // Export as array of {name, map} objects — preserves names and order
  const data = levels.map(l => ({ name: l.name, map: l.map }));
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'defrag-levels.json';
  a.click();
}

// Also available from console
window.defragExportAll = exportAllLevels;

// ---- INIT ----
grid = blankGrid();
render();
updateStatus();
renderSidebar();
</script>
